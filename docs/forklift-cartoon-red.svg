  <circle cx="34" cy="96" r="14" fill="#374151"/>
  <circle cx="34" cy="96" r="8" fill="#6B7280"/>
  <circle cx="34" cy="96" r="3" fill="#D1D5DB"/>
  <circle cx="62" cy="96" r="14" fill="#374151"/>
  <circle cx="62" cy="96" r="8" fill="#6B7280"/>
  <circle cx="62" cy="96" r="3" fill="#D1D5DB"/>
  <!-- Counterweight -->
  <rect x="14" y="64" width="10" height="22" rx="3" fill="#DC2626"/>
