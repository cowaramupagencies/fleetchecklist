<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Cartoon forklift">
  <rect width="128" height="128" rx="20" fill="#FFF1F2"/>
  <ellipse cx="64" cy="108" rx="48" ry="8" fill="#FECDD3" opacity="0.5"/>
  <!-- Mast -->
  <rect x="78" y="28" width="8" height="52" rx="2" fill="#6B7280"/>
  <rect x="86" y="36" width="6" height="44" rx="2" fill="#9CA3AF"/>
