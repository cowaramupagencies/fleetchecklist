  <rect x="92" y="72" width="28" height="5" rx="2" fill="#DC2626"/>
  <rect x="92" y="82" width="28" height="5" rx="2" fill="#DC2626"/>
  <!-- Body -->
  <rect x="18" y="58" width="62" height="34" rx="8" fill="#EF4444"/>
  <rect x="22" y="62" width="54" height="18" rx="4" fill="#F87171"/>
